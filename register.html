<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PlanWise</title>
  <style>
    body {
      background: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      animation: fadeInBody 0.7s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .container {
      width: 350px;
      padding: 32px 24px 24px 24px;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: popInForm 0.7s cubic-bezier(.4,0,.2,1);
    }
    @keyframes popInForm {
      0% { transform: scale(0.95) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .logo {
      font-size: 36px;
      font-weight: bold;
      color: #2D2D2D;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #2D2D2D;
    }
    .input {
      width: 100%;
      height: 44px;
      border: 1px solid #E0E0E0;
      border-radius: 12px;
      padding: 0 14px;
      margin-bottom: 16px;
      font-size: 16px;
      background: #F9F9F9;
      color: #2D2D2D;
      outline: none;
    }
    .register-btn {
      width: 100%;
      height: 44px;
      background: #2D6A4F;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s cubic-bezier(.4,0,.2,1);
    }
    .register-btn:hover, .register-btn:focus {
      background: #22543d;
      transform: scale(1.04);
    }
    .register-btn:active {
      transform: scale(0.97);
    }
    .login-row {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .login-text {
      color: #A0A0A0;
      font-size: 16px;
      margin-right: 8px;
    }
    .login-btn-link {
      background: #fff;
      border: 2px solid #2D6A4F;
      color: #2D6A4F;
      border-radius: 12px;
      padding: 8px 20px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s cubic-bezier(.4,0,.2,1);
      text-decoration: none;
      display: inline-block;
    }
    .login-btn-link:hover, .login-btn-link:focus {
      background: #2D6A4F;
      color: #fff;
      transform: scale(1.04);
    }
    .login-btn-link:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="images/PlanWise.png" alt="PlanWise Logo" style="height:80px;vertical-align:middle;"> <span style="vertical-align:middle;font-size:32px;font-weight:700;margin-left:10px;">PlanWise</span></div>
    <div class="title">Create your account</div>
    <input class="input" type="text" placeholder="Full Name" />
    <input class="input" type="email" placeholder="Email" />
    <input class="input" type="password" placeholder="Password" />
    <input class="input" type="password" placeholder="Confirm Password" />
    <button class="register-btn">Sign Up</button>
        <script>
          document.querySelector('.register-btn').addEventListener('click', function(e) {
            e.preventDefault();
            // Here you could add registration logic (validation, saving, etc.)
            window.location.href = 'login.html';
          });
        </script>
    <div class="login-row">
      <span class="login-text">Already have an account?</span>
      <a class="login-btn-link" href="login.html">Log In</a>
    </div>
  </div>
</body>
</html>

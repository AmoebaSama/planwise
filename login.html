<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page - PlanWise</title>
  <style>
    body {
      background: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      animation: fadeInBody 0.7s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .container {
      width: 350px;
      padding: 32px 24px 24px 24px;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: popInForm 0.7s cubic-bezier(.4,0,.2,1);
    }
    @keyframes popInForm {
      0% { transform: scale(0.95) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .logo {
      font-size: 36px;
      font-weight: bold;
      color: #2D2D2D;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #2D2D2D;
    }
    .input {
      width: 100%;
      height: 44px;
      border: 1px solid #E0E0E0;
      border-radius: 12px;
      padding: 0 14px;
      margin-bottom: 16px;
      font-size: 16px;
      background: #F9F9F9;
      color: #2D2D2D;
      outline: none;
    }
    .login-btn {
      width: 100%;
      height: 44px;
      background: #2D6A4F;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s cubic-bezier(.4,0,.2,1);
    }
    .login-btn:hover, .login-btn:focus {
      background: #22543d;
      transform: scale(1.04);
    }
    .login-btn:active {
      transform: scale(0.97);
    }
    .qr-btn {
      width: 100%;
      height: 44px;
      background: #F1C40F;
      color: #2D2D2D;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s cubic-bezier(.4,0,.2,1);
    }
    .qr-btn:hover, .qr-btn:focus {
      background: #e1b90e;
      transform: scale(1.04);
    }
    .qr-btn:active {
      transform: scale(0.97);
    }
    .signup-row {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .signup-text {
      color: #A0A0A0;
      font-size: 16px;
      margin-right: 8px;
    }
    .signup-btn {
      background: #fff;
      border: 2px solid #2D6A4F;
      color: #2D6A4F;
      border-radius: 12px;
      padding: 8px 20px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s cubic-bezier(.4,0,.2,1);
    }
    .signup-btn:hover, .signup-btn:focus {
      background: #2D6A4F;
      color: #fff;
      transform: scale(1.04);
    }
    .signup-btn:active {
      transform: scale(0.97);
    }
    .qr-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .qr-content {
      background: #fff;
      padding: 32px 24px;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .close-btn {
      margin-top: 18px;
      background: #2D6A4F;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="EMTECH3/components/PlanWise.png" alt="PlanWise Logo" style="height:80px;vertical-align:middle;"> <span style="vertical-align:middle;font-size:32px;font-weight:700;margin-left:10px;">PlanWise</span></div>
    <div class="title">Log in to your account</div>
    <input class="input" type="email" placeholder="Email" />
    <input class="input" type="password" placeholder="Password" />
    <button class="login-btn" onclick="window.location.href='scheduler.html'">Log In</button>
    <button class="qr-btn" onclick="showQR()">Show QR Code</button>
    <div class="signup-row">
      <span class="signup-text">Don't have an account?</span>
      <a class="signup-btn" href="register.html">Sign Up</a>
    </div>
  </div>
  <div id="qr-modal" class="qr-modal" style="display:none;">
    <div class="qr-content">
      <div id="qr-code"></div>
      <button class="close-btn" onclick="closeQR()">Close</button>
    </div>
  </div>
  <script>
    function showQR() {
      document.getElementById('qr-modal').style.display = 'flex';
      var qr = new QRious({
        element: document.createElement('canvas'),
        value: 'https://your-app-link.com',
        size: 220
      });
      var qrDiv = document.getElementById('qr-code');
      qrDiv.innerHTML = '';
      qrDiv.appendChild(qr.element);
    }
    function closeQR() {
      document.getElementById('qr-modal').style.display = 'none';
    }
  </script>
</body>
</html>
